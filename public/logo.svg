<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="10" fill="#080c14"/>
  <!-- "3" numeral -->
  <text x="5" y="44" font-family="Arial Black, Arial, sans-serif" font-size="30" font-weight="900" fill="#fff200">3</text>
  <!-- "11" numerals -->
  <text x="29" y="44" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">11</text>
  <!-- Live indicator dot -->
  <circle cx="56" cy="13" r="5" fill="#22d3ee">
    <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
